databases:
  - name: xyne-db
    plan: starter
    databaseName: xyne
    user: xyne
    postgresMajorVersion: 15

services:
  - type: pserv
    name: xyne-vespa
    env: docker
    dockerfilePath: ./Dockerfile-vespa
    plan: starter
    disk:
      name: vespa-data
      mountPath: /opt/vespa/var
      sizeGB: 20
    envVars:
      - key: VESPA_CONFIGSERVER_JVMARGS
        value: -Xms1g -Xmx4g -XX:+UseG1GC
      - key: VESPA_CONFIGPROXY_JVMARGS
        value: -Xms512m -Xmx2g -XX:+UseG1GC
      - key: VESPA_ALLOW_WRITE_AS_USER
        value: "true"

  - type: web
    name: xyne-app
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: METRICS_PORT
        value: "3001"

      - key: DATABASE_URL
        fromDatabase:
          name: xyne-db
          property: connectionString

      - key: DATABASE_HOST
        fromDatabase:
          name: xyne-db
          property: host

      - key: DATABASE_PORT
        fromDatabase:
          name: xyne-db
          property: port

      - key: DATABASE_USER
        fromDatabase:
          name: xyne-db
          property: user

      - key: DATABASE_PASSWORD
        fromDatabase:
          name: xyne-db
          property: password

      - key: DATABASE_NAME
        fromDatabase:
          name: xyne-db
          property: database

      - key: VESPA_HOST
        value: xyne-vespa
      - key: VESPA_FEED_PORT
        value: "8080"
      - key: VESPA_QUERY_PORT
        value: "8081"

      - key: EMBEDDING_MODEL
        value: bge-small-en-v1.5
      - key: REASONING
        value: "true"

      - key: HOST
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: ENCRYPTION_KEY
        sync: false
      - key: SERVICE_ACCOUNT_ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: USER_SECRET
        sync: false

      - key: LIVEKIT_API_KEY
        value: devkey
      - key: LIVEKIT_API_SECRET
        value: devsecret
